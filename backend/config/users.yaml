# 本地用户配置文件
# 用户信息的增删仅允许通过编辑此文件进行修改，系统启动时自动同步到数据库。
# 删除此文件中的用户条目后重启服务，对应用户将被禁用。
#
# 格式说明:
#   users:
#     - username: 用户名（唯一标识，不可重复）
#       password_env: 从环境变量读取密码，推荐方式，避免真实密码进入仓库
#       password: 仅限本地临时调试使用，不建议提交到版本控制
#       role: 角色（admin 或 user，默认 user）
#
# 推荐配置：
#   1. 在环境变量中设置 OPENAWA_ADMIN_PASSWORD / OPENAWA_USER_PASSWORD
#   2. 保持本文件仅保存用户名、角色和环境变量名
users:
  - username: admin
    password_env: OPENAWA_ADMIN_PASSWORD
    role: admin
  - username: user
    password_env: OPENAWA_USER_PASSWORD
    role: user
