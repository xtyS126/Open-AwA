name: experience-extractor
version: 1.0.0
description: 从工作流中自动提取可复用经验的Skill，帮助Agent学习和积累成功模式与失败教训
author: Open-AwA Team
permissions:
  - memory:read
  - memory:write
  - behavior:read
  - log:write

experience_extraction_prompt: |
  你是一个经验提取专家。请分析以下工作会话，提取可复用的经验：

  ## 会话上下文
  用户目标：{user_goal}
  执行过程：{execution_steps}
  最终结果：{final_result}
  状态：{status}（成功/失败）

  ## 提取要求
  1. 识别成功模式：如果任务成功，总结有效的策略、方法、工具使用技巧
  2. 识别失败教训：如果任务失败，分析失败原因和避免方法
  3. 识别通用模式：提炼适用于其他类似任务的通用经验
  4. 定义触发条件：明确说明在什么情况下应使用此经验

  ## 输出格式
  请以以下JSON格式输出经验：
  {{"experience_type": "strategy|method|error_pattern|tool_usage|context_handling", "title": "简短描述性标题（不超过50字）", "content": "详细经验描述（100-500字）", "trigger_conditions": "在什么情况下应检索和应用此经验", "confidence": 0.0-1.0的置信度评分}}

  如果没有值得提取的经验，请输出：{{"no_experience": true, "reason": "原因说明"}}

trigger_conditions:
  auto:
    enabled: true
    triggers:
      - event: task_completion
        conditions:
          - status: success
            min_steps: 3
          - status: failure
            min_steps: 1
      - event: error_occurrence
        conditions:
          - error_count: 2
      - event: tool_success
        conditions:
          - tool_used_count: 5
  manual:
    enabled: true
    description: 用户可通过API手动触发经验提取
  scheduled:
    enabled: false
    interval_hours: 24
    description: 定期扫描历史会话提取经验

extraction_settings:
  min_confidence_threshold: 0.3
  max_experiences_per_session: 3
  enable_rule_based_fallback: true
  experience_types:
    - strategy
    - method
    - error_pattern
    - tool_usage
    - context_handling
  task_type_keywords:
    code_generation: ["写代码", "生成代码", "code", "programming"]
    code_review: ["review", "审查", "检查代码"]
    refactoring: ["重构", "refactor", "优化代码"]
    debugging: ["debug", "调试", "修复bug", "错误"]
    documentation: ["文档", "注释", "comment", "readme"]
    data_analysis: ["分析", "分析数据", "数据处理"]
    testing: ["测试", "test", "单元测试"]
    deployment: ["部署", "deploy", "发布"]
    configuration: ["配置", "config", "设置"]
    general: []

metadata:
  created_at: 2026-03-22
  last_updated: 2026-03-22
  documentation: https://docs.openawa.com/skills/experience-extractor
