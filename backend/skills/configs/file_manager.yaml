name: file_manager
version: 1.0.0
description: 文件管理技能，提供文件读取、写入、列表等操作，包含权限控制
author: Open-AwA Team
category: built_in
tags:
  - file
  - tool
  - built_in
builtin_tool: file_manager
auto_executable: false
steps: []

permissions:
  - file:read
  - file:write
  - directory:list
  - directory:create

allowed_directories:
  - .

tools:
  read_file:
    name: read_file
    description: 读取文件内容
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要读取的文件路径
      required:
        - path

  write_file:
    name: write_file
    description: 写入文件内容
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要写入的文件路径
        content:
          type: string
          description: 要写入的内容
      required:
        - path
        - content

  list_files:
    name: list_files
    description: 列出目录中的文件
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要列出的目录路径
        pattern:
          type: string
          description: 文件匹配模式
          default: "*"
      required:
        - path

  delete_file:
    name: delete_file
    description: 删除文件或目录
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要删除的文件或目录路径
      required:
        - path

  create_directory:
    name: create_directory
    description: 创建目录
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要创建的目录路径
      required:
        - path

  file_exists:
    name: file_exists
    description: 检查文件或目录是否存在
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 要检查的文件或目录路径
      required:
        - path

security:
  path_validation: true
  allowed_extensions: []
  blocked_paths:
    - /etc
    - /root
    - /sys
    - /proc

metadata:
  created_at: 2026-03-23
  last_updated: 2026-03-23
  documentation: https://docs.openawa.com/skills/file-manager
